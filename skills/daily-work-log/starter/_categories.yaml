# 주간업무 카테고리 사전 (starter)
# 회사·업무 성격에 맞춰 `name`/`overview`/`aliases`를 수정해서 사용하세요.
# 새 카테고리는 아래에 append만 하고, 기존 항목은 함부로 삭제하지 말 것
# (과거 로그가 해당 카테고리를 참조하고 있으면 집계에 문제가 생김).

categories:

  - name: "예시 - 분석 보고"
    aliases: ["분석", "리포트"]
    overview: "주간/월간 성과 분석 및 보고"

  - name: "예시 - 콘텐츠 제작"
    aliases: ["콘텐츠", "블로그"]
    overview: "블로그/영상 등 콘텐츠 제작"

  - name: "예시 - 발주/입고"
    aliases: ["발주", "입고"]
    overview: "부품·제품 발주 및 입고 관리"

# --- 규칙 ---
# 1. 새 카테고리는 name(정식명) + overview(한 줄) 함께 등록
# 2. 과거 표기는 aliases에 남겨두면 예전 로그도 집계 가능
# 3. 카테고리 통합·분리 시 기존 일일 로그 파일은 건드리지 말고 여기 사전만 업데이트
